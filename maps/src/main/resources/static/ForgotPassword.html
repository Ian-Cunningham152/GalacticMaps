<!DOCTYPE html>


<head>
    <meta charset="UTF-8">
    <link rel ="stylesheet" href="./styles/login.css">
    <title>Reset Password</title>
</head>

<body>
    <div class="login-contianer">
        <form class="login-form" id="reset-password-form">
            <img src="./images/GalacticMapsLogo.png" alt="Logo">
            <h1>Reset Password</h1>
            <input id="reset-username" type="text" placeholder="Username" required>
            <input id="reset-password" type="password" placeholder="Password" required>
            <input id="reset-confirm-password" type="password" placeholder="Repeat Password" required>
            <p id="reset-message"></p>
            <button type="submit">Change Password</button>
        </form>
    </div>
    <script src="./js/auth.js"></script>
</body>
