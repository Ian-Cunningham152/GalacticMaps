<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <link rel ="stylesheet" href="./styles/login.css">
    <title>GM Create Account</title>
</head>

<body>
    <div class="login-contianer">
        <form class="login-form" id="create-account-form">
            <img src="./images/GalacticMapsLogo.png" alt="Logo">
            <h1>CreateAccount</h1>
            <input id="create-username" type="text" placeholder="Username" required>
            <input id="create-password" type="password" placeholder="Password" required>
            <input id="create-confirm-password" type="password" placeholder="Repeat Password" required>
            <p id="create-message"></p>
            <button type="submit">Create Account!</button>
        </form>
    </div>
    <script src="./js/auth.js"></script>
</body>
